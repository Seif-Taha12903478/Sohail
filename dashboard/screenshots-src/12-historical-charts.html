<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg-primary:#0f172a;--bg-secondary:#1e293b;--border:#334155;--text-primary:#f1f5f9;--text-secondary:#94a3b8;--text-muted:#64748b;--accent:#06b6d4;--warning:#f59e0b;--success:#10b981;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;-webkit-font-smoothing:antialiased}
.app{max-width:1400px;margin:0 auto;padding:24px}
.header{display:flex;justify-content:space-between;align-items:center;padding:20px 0;border-bottom:1px solid var(--border);margin-bottom:32px}
.header h1{font-size:1.75rem;font-weight:700;letter-spacing:-0.02em}.header h1 span{color:var(--accent)}
.connection-badge{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:999px;font-size:0.8125rem;font-weight:500;background:var(--bg-secondary);border:1px solid var(--border)}
.connection-dot{width:8px;height:8px;border-radius:50%;background:var(--success);box-shadow:0 0 8px var(--success)}
.tabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--border)}
.tab{padding:12px 24px;background:none;border:none;color:var(--text-secondary);font-size:0.9375rem;font-weight:500;border-bottom:2px solid transparent;font-family:inherit}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.3);margin-bottom:20px}
.card h2{font-size:1.125rem;font-weight:600;margin-bottom:16px}
.range-buttons{display:flex;gap:8px}.range-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-secondary);font-size:0.8125rem}
.range-btn.active{background:var(--accent);border-color:var(--accent);color:white}
.chart-container{width:100%;height:320px;margin-top:16px}
.controls-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center}
.stat-label{font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;font-weight:500;margin-bottom:8px}
.stat-value{font-size:1.75rem;font-weight:700}.stat-value.temp{color:var(--warning)}.stat-value.light{color:var(--accent)}
.btn{padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);font-size:0.875rem;font-weight:500;font-family:inherit}
.btn.primary{background:var(--accent);border-color:var(--accent);color:white}
.moving-avg-toggle{display:flex;align-items:center;gap:8px;font-size:0.8125rem;color:var(--text-secondary)}
.toggle-switch{width:36px;height:20px;background:var(--accent);border-radius:999px;position:relative}
.toggle-switch::after{content:'';position:absolute;width:16px;height:16px;background:white;border-radius:50%;top:2px;right:2px}
.ref-line-label{font-size:0.75rem;color:var(--text-muted);display:flex;align-items:center;gap:6px;margin-top:8px}
.ref-line-label .dash{width:20px;height:2px;background:var(--warning)}
</style></head><body>
<div class="app">
  <div class="header"><div><h1>IoT <span>Environmental Monitoring</span></h1><div style="font-size:0.875rem;color:var(--text-muted);margin-top:4px">Historical Analytics — Temperature & Light Charts</div></div><div class="connection-badge"><div class="connection-dot"></div>Live</div></div>
  <div class="tabs"><button class="tab">Live View</button><button class="tab active">History and Charts</button><button class="tab">Alerts (2)</button></div>
  <div class="controls-row">
    <div style="display:flex;gap:12px;align-items:center"><span style="font-size:0.8125rem;color:var(--text-secondary);font-weight:500">Device:</span><select style="padding:10px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);font-size:0.875rem"><option>esp32-001</option><option>esp32-002</option></select></div>
    <div class="range-buttons"><button class="range-btn active">Last Hour</button><button class="range-btn">Last 24h</button><button class="range-btn">Last 7 Days</button></div>
    <div class="moving-avg-toggle"><span>Moving Average (5pt)</span><div class="toggle-switch"></div></div>
    <button class="btn primary">Export CSV</button>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Avg Temp</div><div class="stat-value temp">27.3°C</div></div>
    <div class="stat-card"><div class="stat-label">Max Temp</div><div class="stat-value temp">35.7°C</div></div>
    <div class="stat-card"><div class="stat-label">Avg Light</div><div class="stat-value light">420 lx</div></div>
    <div class="stat-card"><div class="stat-label">Max Light</div><div class="stat-value light">548 lx</div></div>
  </div>
  <div class="card"><h2>Temperature Over Time</h2><div class="chart-container"><canvas id="tempChart"></canvas></div><div class="ref-line-label"><div class="dash"></div>Max threshold (30°C) · Min (23°C) — reference lines</div></div>
  <div class="card"><h2>Light Level Over Time</h2><div class="chart-container"><canvas id="lightChart"></canvas></div><div class="ref-line-label"><div class="dash" style="background:var(--accent)"></div>Range: 314–548 lx</div></div>
</div>
<script>
const r=[{time:"11:13",temp:24.5,light:527},{time:"11:12",temp:28.7,light:361},{time:"11:11",temp:28.4,light:405},{time:"11:10",temp:35.7,light:368},{time:"11:09",temp:33.9,light:479},{time:"11:08",temp:31.6,light:390},{time:"11:07",temp:28.9,light:453},{time:"11:06",temp:30.5,light:459},{time:"11:05",temp:29.2,light:361},{time:"11:04",temp:28.0,light:464},{time:"11:03",temp:29.8,light:504},{time:"11:02",temp:28.1,light:548},{time:"11:01",temp:33.2,light:494},{time:"11:00",temp:29.2,light:509},{time:"10:59",temp:31.3,light:413},{time:"10:58",temp:32.7,light:422},{time:"10:57",temp:34.9,light:395},{time:"10:56",temp:31.3,light:481},{time:"10:55",temp:32.0,light:418},{time:"10:54",temp:28.6,light:433},{time:"10:53",temp:29.0,light:484},{time:"10:52",temp:27.1,light:369},{time:"10:51",temp:26.9,light:487},{time:"10:50",temp:28.9,light:422},{time:"10:49",temp:32.8,light:507},{time:"10:48",temp:32.9,light:518},{time:"10:47",temp:29.9,light:360},{time:"10:46",temp:32.9,light:519},{time:"10:45",temp:29.0,light:352},{time:"10:44",temp:28.8,light:394},{time:"10:43",temp:27.1,light:506},{time:"10:42",temp:33.8,light:382},{time:"10:41",temp:31.3,light:354},{time:"10:40",temp:33.2,light:383},{time:"10:39",temp:33.3,light:405},{time:"10:38",temp:33.8,light:431},{time:"10:37",temp:32.2,light:438},{time:"10:36",temp:33.6,light:524},{time:"10:35",temp:26.3,light:540},{time:"10:34",temp:33.4,light:445},{time:"10:33",temp:32.7,light:463},{time:"10:32",temp:33.2,light:538},{time:"10:31",temp:30.7,light:441},{time:"10:30",temp:25.9,light:449},{time:"10:29",temp:30.4,light:345},{time:"10:28",temp:31.8,light:502},{time:"10:27",temp:31.3,light:341},{time:"10:26",temp:30.8,light:500},{time:"10:25",temp:32.4,light:373},{time:"10:24",temp:32.5,light:457},{time:"10:23",temp:28.9,light:439},{time:"10:22",temp:28.2,light:453},{time:"10:21",temp:25.6,light:464},{time:"10:20",temp:28.9,light:442},{time:"10:19",temp:31.0,light:530},{time:"10:18",temp:25.7,light:409},{time:"10:17",temp:26.1,light:454},{time:"10:16",temp:31.6,light:384},{time:"10:15",temp:30.8,light:463},{time:"10:14",temp:28.8,light:514},{time:"10:13",temp:29.7,light:414},{time:"10:12",temp:29.9,light:503},{time:"10:11",temp:25.8,light:503},{time:"10:10",temp:32.4,light:407},{time:"10:09",temp:28.9,light:431},{time:"10:08",temp:24.9,light:379},{time:"10:07",temp:32.2,light:379},{time:"10:06",temp:29.2,light:517},{time:"10:05",temp:27.7,light:359},{time:"10:04",temp:27.0,light:364},{time:"10:03",temp:25.2,light:476},{time:"10:02",temp:24.8,light:358},{time:"10:01",temp:30.3,light:477},{time:"10:00",temp:25.1,light:391}].reverse();
const labels=r.map(x=>x.time),t=r.map(x=>x.temp),l=r.map(x=>x.light);
function ma(a,w){return a.map((_,i)=>{const s=Math.max(0,i-w+1);return a.slice(s,i+1).reduce((p,c)=>p+c,0)/(i-s+1)})}
const co={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:'#94a3b8',font:{size:11}}}},scales:{x:{ticks:{color:'#64748b',font:{size:9}},grid:{color:'#334155'}},y:{ticks:{color:'#64748b',font:{size:10}},grid:{color:'#334155'}}},elements:{point:{radius:0},line:{borderWidth:2}}};
new Chart(document.getElementById('tempChart'),{type:'line',data:{labels,datasets:[{label:'Temperature (°C)',data:t,borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,0.1)',fill:true},{label:'Moving Average (5pt)',data:ma(t,5),borderColor:'#ef4444',borderDash:[5,5],fill:false,pointRadius:0}]},options:co});
new Chart(document.getElementById('lightChart'),{type:'line',data:{labels,datasets:[{label:'Light (lx)',data:l,borderColor:'#06b6d4',backgroundColor:'rgba(6,182,212,0.1)',fill:true},{label:'Moving Average (5pt)',data:ma(l,5),borderColor:'#8b5cf6',borderDash:[5,5],fill:false,pointRadius:0}]},options:co});
</script></body></html>
